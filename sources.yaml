# ============================================================
# SOURCES — Edit this file to control what the agent reads
# ============================================================
# To disable a source, add a "#" at the start of the line.
# To add a new one, just copy the format and paste a new entry.

# ── Reddit ──────────────────────────────────────────────────
# These are fetched via Reddit's public RSS feed (no login needed).
# Format: https://www.reddit.com/r/SUBREDDIT/top.rss?t=day&limit=10
reddit:
  subreddits:
    # Tech & AI
    - technology         # General tech news
    - MachineLearning    # AI research papers and discussions
    - artificial         # AI news and discussion
    - singularity        # Futurism & cutting-edge tech
    - programming        # Software development
    - compsci            # Computer science
    - LocalLLaMA         # Open-source LLM news
    
    # Biology & Life Sciences
    - biology            # General biology news
    - bioinformatics     # Computational biology
    - biotech            # Biotechnology news
    - longevity          # Aging research and life extension
    - genetics           # Genetics research
    - Neuroscience       # Brain and neuroscience
    
    # Startups & Business
    - startups           # Startup news and discussions
    - Entrepreneur       # Entrepreneurship
    - venturecapital     # VC funding and trends
    - SaaS               # SaaS business news
    
    # Science
    - science            # Scientific breakthroughs
    - Physics            # Physics news
    - Futurology         # Future technology
    
  posts_per_subreddit: 5   # Top N posts to grab per subreddit
  min_score: 100           # Ignore posts with fewer than this many upvotes


# ── Twitter / X (via Nitter RSS — free, no account needed) ──
# Nitter is a privacy-friendly Twitter front-end that provides RSS feeds.
# If one Nitter instance is blocked, the script tries the next one.
twitter:
  enabled: true
  # List of Twitter handles to follow (no "@" symbol needed)
  accounts:
    # AI Researchers & Leaders
    - sama              # Sam Altman (OpenAI CEO)
    - karpathy          # Andrej Karpathy (AI researcher)
    - ylecun            # Yann LeCun (Meta AI chief)
    - geoffreyhinton    # Geoffrey Hinton
    - demishassabis     # Demis Hassabis (Google DeepMind)
    - OpenAI            # OpenAI official
    - AnthropicAI       # Anthropic official
    - GoogleDeepMind    # Google DeepMind official
    - MistralAI         # Mistral AI
    
    # Biology & Life Sciences
    - EricTopol         # Eric Topol (genomics, digital medicine)
    - dgmacarthur       # Daniel MacArthur (genomics)
    - Bill_Hanage       # Bill Hanage (epidemiology)
    - edyong209          # Ed Yong (science journalist)
    - Neuro_Skeptic     # Neuroscience researcher
    - ProfAliceRoberts  # Alice Roberts (human evolution)
    
    # Startups & VCs
    - pmarca            # Marc Andreessen (a16z)
    - balajis           # Balaji Srinivasan
    - paulg             # Paul Graham (YC)
    - naval             # Naval Ravikant
    - ycombinator       # Y Combinator official
    - a16z              # Andreessen Horowitz
    - sequoia           # Sequoia Capital
    - GV                # Google Ventures
    - patio11           # Patrick McKenzie (tech business)
    
    # Tech & General
    - elonmusk          # Elon Musk
    
  tweets_per_account: 3  # Max tweets to grab per account
  # Nitter instances — the script tries each in order until one works
  nitter_instances:
    - https://nitter.net
    - https://nitter.privacydev.net
    - https://nitter.poast.org
    - https://nitter.catsarch.com


